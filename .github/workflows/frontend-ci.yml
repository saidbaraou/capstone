name: React Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@4

      - name: Set up Node.js
        uses: actions/Setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Check for linting errors
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm test -- --watchAll=false
    